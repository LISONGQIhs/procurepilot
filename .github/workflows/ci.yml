name: CI

on:
  push:
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    env:
      PROCUREPILOT_LLM_ENABLED: "false"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Compile Python files
        run: python -m compileall app scripts

      - name: Run boundary checks
        run: python scripts/check_boundary_cases.py

      - name: Run LLM compliance flag check
        run: python scripts/check_llm_compliance_flag.py

      - name: Run evaluation
        run: python scripts/evaluate.py
